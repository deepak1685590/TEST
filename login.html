<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSignal Pro v2 - Access</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="background-effects">
        <canvas id="matrix-canvas"></canvas>
        <audio id="matrix-audio" loop src="https://supertopic.io/wp-content/uploads/2025/08/system-alerts-hacker-attitude-shorts-128-ytshorts.savetube.me_.mp3"></audio>
        <!-- This div will be used for animated background effects -->
        <div class="scanner-line"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="access-tabs">
                <button class="tab active" id="user-tab">USER ACCESS</button>
                <button class="tab" id="admin-tab">ADMIN ACCESS</button>
            </div>

            <div class="form-header">
                <h1 id="form-title">User Login</h1>
                <p id="form-subtitle">Enter your credentials to continue</p>
            </div>

            <div id="status-container">
                <!-- Status messages (e.g., pending, revoked) will be injected here by JavaScript -->
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="form-footer">
                <p>New user? Just enter a username and password to create an account.</p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
    <div id="mute-btn">🔊</div>
</body>
</html>
